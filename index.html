<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebGPU FAQ Assistant</title>
    <style>
        :root {
            --bg-color: #131314;
            --container-bg: #1e1f20;
            --sidebar-bg: #1a1a1c;
            --text-primary: #e3e3e3;
            --text-secondary: #b4b4b4;
            --input-bg: #282a2c;
            --accent-gradient: linear-gradient(70deg, #4285f4, #9b51e0, #e05151);
            --border-glow: rgba(255, 255, 255, 0.04);
            --hover-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: "Google Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 0; 
            margin: 0; 
            background: var(--bg-color); 
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        #app-window {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            background: var(--container-bg);
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            box-sizing: border-box;
            position: relative;
        }

        /* --- SIDEBAR SYSTEM --- */
        #sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            z-index: 10;
        }

        #sidebar.hidden {
            margin-left: -260px;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-btn {
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .sidebar-btn:hover {
            background: var(--hover-bg);
        }

        /* Search Filter Box inside Sidebar */
        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .search-wrapper svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
        }

        .search-input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px 12px 10px 36px;
            color: white;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
        }

        .search-input:focus {
            border-color: rgba(255,255,255,0.15);
        }

        .history-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 10px;
            padding-left: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Toggle Exit Button for Sidebar */
        .close-sidebar-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-sidebar-btn:hover {
            background: var(--hover-bg);
            color: white;
        }

        #history-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-item:hover, .history-item.active {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        /* --- MAIN CHAT SYSTEM --- */
        #chat-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .gemini-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(30, 31, 32, 0.8);
            backdrop-filter: blur(10px);
        }

        .menu-toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-toggle-btn:hover {
            background: var(--hover-bg);
        }

        .header-title {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.2px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            flex-grow: 1;
        }
        
        #status { 
            font-size: 11px; 
            color: var(--text-secondary); 
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        #output { 
            flex-grow: 1;
            overflow-y: auto; 
            padding: 30px; 
            display: flex;
            flex-direction: column;
            gap: 24px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        #output::-webkit-scrollbar { width: 4px; }
        #output::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        
        .message-row { display: flex; width: 100%; }
        .message-row.user-row { justify-content: flex-end; }
        .message-row.ai-row { justify-content: flex-start; }

        .bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .user-bubble { background: #2b2c2e; color: var(--text-primary); border-bottom-right-radius: 4px; }
        .ai-bubble { background: transparent; color: var(--text-primary); padding-left: 0; }
        
        .source-container { margin-top: 10px; display: block; }
        .source-link { 
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
            background: rgba(66, 133, 244, 0.15); border: 1px solid rgba(66, 133, 244, 0.3);
            color: #8ab4f8; font-weight: 500; text-decoration: none; font-size: 13px; border-radius: 20px; transition: all 0.2s ease;
        }
        .source-link:hover { background: rgba(66, 133, 244, 0.25); border-color: #8ab4f8; transform: translateY(-1px); }

        .input-wrapper { padding: 20px 30px 30px 30px; background: linear-gradient(to top, var(--container-bg) 80%, transparent); }
        .input-container { 
            display: flex; align-items: center; background: var(--input-bg); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; padding: 6px 10px 6px 20px; transition: all 0.2s ease;
        }
        .input-container:focus-within { border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        input[type="text"] { flex-grow: 1; border: none; background: transparent; color: white; font-size: 15px; outline: none; padding: 10px 0; }
        input::placeholder { color: rgba(255, 255, 255, 0.35); }
        
        .send-btn { 
            background: transparent; color: #8ab4f8; border: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: all 0.2s ease; 
        }
        .send-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.05); color: white; }
        .send-btn:disabled { color: rgba(255, 255, 255, 0.15); cursor: not-allowed; }
        svg { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body>

<div id="app-window">
    <!-- LEFT SIDEBAR -->
    <div id="sidebar">
        <button class="sidebar-btn" onclick="startNewChat()">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            New chat
        </button>
        
        <div class="search-wrapper">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
