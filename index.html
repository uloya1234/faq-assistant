<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebGPU FAQ Assistant</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 10px; 
            margin: 0; 
            background: #000000; 
            color: #ffffff;
            display: flex;
            justify-content: center;
        }
        
        #chat-box { 
            width: 100%;
            max-width: 500px; 
            background: rgba(20, 20, 20, 0.6); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 12px 40px rgba(0,0,0,0.5); 
            box-sizing: border-box; 
        }
        
        #output { 
            height: 280px; 
            overflow-y: auto; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            background: rgba(255, 255, 255, 0.02); 
            padding: 16px; 
            margin-bottom: 16px; 
            border-radius: 14px; 
            font-size: 14px; 
            line-height: 1.6;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }

        /* Custom scrollbar style */
        #output::-webkit-scrollbar { width: 6px; }
        #output::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        
        #status { 
            font-size: 11px; 
            color: rgba(255, 255, 255, 0.4); 
            margin-bottom: 16px; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-container { 
            display: flex; 
            gap: 10px; 
        }
        
        input { 
            flex-grow: 1; 
            padding: 12px 16px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 12px; 
            font-size: 14px; 
            outline: none; 
            transition: all 0.2s ease;
        }
        
        input:focus { 
            border-color: rgba(16, 163, 127, 0.8); 
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.15);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        button { 
            background: #10a37f; 
            color: white; 
            border: none; 
            padding: 12px 22px; 
            font-weight: 600; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 14px; 
            transition: all 0.2s ease; 
        }
        
        button:hover:not(:disabled) { 
            background: #1a7f66; 
            transform: translateY(-1px);
        }

        button:active:not(:disabled) { 
            transform: translateY(0);
        }
        
        button:disabled { 
            background: rgba(255, 255, 255, 0.05); 
            color: rgba(255, 255, 255, 0.2);
            cursor: not-allowed; 
        }
        
        .user-msg {
            margin: 12px 0;
            color: rgba(255, 255, 255, 0.6);
        }

        .ai-msg {
            margin: 12px 0;
            color: #ffffff;
            font-weight: 400;
        }

        .source-link { 
            display: inline-flex; 
            align-items: center;
            gap: 4px;
            margin-top: 4px; 
            color: #10a37f; 
            font-weight: 600; 
            text-decoration: none; 
            font-size: 13px; 
            transition: color 0.2s;
        }
        
        .source-link:hover { 
            color: #1a7f66;
            text-decoration: underline; 
        }
        
        hr {
            border: 0; 
            border-top: 1px solid rgba(255, 255, 255, 0.06); 
            margin: 16px 0;
        }
    </style>
</head>
<body>

<div id="chat-box">
    <div id="status">⏳ Loading AI Model (WebGPU)...</div>
    <div id="output"></div>
    <div class="input-container">
        <input type="text" id="query" placeholder="Ask about materials, links, pricing..." disabled>
        <button id="send-btn" onclick="askAssistant()" disabled>Ask</button>
    </div>
</div>

<script type="module">
    import { pipeline, cosineSimilarity } from 'https://jsdelivr.net';

    let extractor;
    let faqDatabase = [];
    const statusDiv = document.getElementById('status');

    async function init() {
        try {
            const response = await fetch('faq-data.json');
            faqDatabase = await response.json();

            statusDiv.innerText = "⚡ Initializing WebGPU hardware acceleration...";
            
            extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                device: 'webgpu' 
            });

            statusDiv.innerText = "🧠 Processing knowledge base...";
            for (let item of faqDatabase) {
                const output = await extractor(item.text, { pooling: 'mean', normalize: true });
                item.embedding = output.data;
            }

            statusDiv.innerText = "🟢 AI Assistant Ready (Offline/Local WebGPU)";
            document.getElementById('query').disabled = false;
            document.getElementById('send-btn').disabled = false;
        } catch (err) {
            console.log("WebGPU fallback triggered:", err);
            try {
                statusDiv.innerText = "🔄 Running on CPU fallback mode...";
                extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                statusDiv.innerText = "🟢 AI Assistant Ready (CPU Fallback Mode)";
                document.getElementById('query').disabled = false;
                document.getElementById('send-btn').disabled = false;
            } catch (fallbackErr) {
                statusDiv.innerText = "❌ Error loading the AI module.";
            }
        }
    }

    window.askAssistant = async function() {
        const queryInput = document.getElementById('query');
        const queryText = queryInput.value.trim();
        if (!queryText) return;

        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML += `<div class="user-msg"><strong>You:</strong> ${queryText}</div>`;
        queryInput.value = '';
        
        const queryEmbeddingOutput = await extractor(queryText, { pooling: 'mean', normalize: true });
        const queryEmbedding = queryEmbeddingOutput.data;

        let bestMatch = null;
        let highestScore = -1;

        for (let item of faqDatabase) {
            const score = cosineSimilarity(queryEmbedding, item.embedding);
            if (score > highestScore) {
                highestScore = score;
                bestMatch = item;
            }
        }

        if (highestScore > 0.45) {
            outputDiv.innerHTML += `
                <div class="ai-msg"><strong>AI:</strong> ${bestMatch.text}</div>
                <a class="source-link" href="${bestMatch.link}" target="_blank">🔗 View Relevant Site Page</a>
                <hr>
            `;
        } else {
            outputDiv.innerHTML += `
                <div class="ai-msg"><strong>AI:</strong> I couldn't find a direct match for that operational detail. Please reach out to our staff directly!</div>
                <hr>
            `;
        }

        outputDiv.scrollTop = outputDiv.scrollHeight;
    };

    init();
</script>

</body>
</html>
