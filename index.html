<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebGPU FAQ Assistant</title>
    <style>
        :root {
            --bg-color: #131314;
            --container-bg: #1e1f20;
            --text-primary: #e3e3e3;
            --text-secondary: #b4b4b4;
            --input-bg: #282a2c;
            --accent-gradient: linear-gradient(70deg, #4285f4, #9b51e0, #e05151);
            --border-glow: rgba(255, 255, 255, 0.04);
        }

        body { 
            font-family: "Google Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 0; 
            margin: 0; 
            background: var(--bg-color); 
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        #chat-container { 
            width: 100%;
            max-width: 700px; 
            height: 90vh;
            background: var(--container-bg); 
            display: flex;
            flex-direction: column;
            border-radius: 24px; 
            border: 1px solid var(--border-glow); 
            box-shadow: 0 16px 40px rgba(0,0,0,0.6); 
            box-sizing: border-box; 
            overflow: hidden;
            position: relative;
        }

        /* Top Header Navigation Panel */
        .gemini-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 31, 32, 0.8);
            backdrop-filter: blur(10px);
        }

        .header-title {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.2px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        #status { 
            font-size: 11px; 
            color: var(--text-secondary); 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Conversation Thread View */
        #output { 
            flex-grow: 1;
            overflow-y: auto; 
            padding: 30px; 
            display: flex;
            flex-direction: column;
            gap: 24px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        #output::-webkit-scrollbar { width: 4px; }
        #output::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        
        /* Message Layout Mechanics */
        .message-row {
            display: flex;
            width: 100%;
            margin: 0;
        }

        .message-row.user-row { justify-content: flex-end; }
        .message-row.ai-row { justify-content: flex-start; }

        .bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .user-bubble {
            background: #2b2c2e;
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
            font-weight: 400;
        }

        .ai-bubble {
            background: transparent;
            color: var(--text-primary);
            padding-left: 0;
            font-weight: 400;
        }
        
        .source-container {
            margin-top: 10px;
            display: block;
        }

        .source-link { 
            display: inline-flex; 
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(66, 133, 244, 0.15);
            border: 1px solid rgba(66, 133, 244, 0.3);
            color: #8ab4f8; 
            font-weight: 500; 
            text-decoration: none; 
            font-size: 13px; 
            border-radius: 20px;
            transition: all 0.2s ease;
        }
        
        .source-link:hover { 
            background: rgba(66, 133, 244, 0.25);
            border-color: #8ab4f8;
            transform: translateY(-1px);
        }

        /* Bottom Floating Pill Box Input Wrapper */
        .input-wrapper {
            padding: 20px 30px 30px 30px;
            background: linear-gradient(to top, var(--container-bg) 80%, transparent);
        }
        
        .input-container { 
            display: flex; 
            align-items: center;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 6px 10px 6px 20px;
            transition: all 0.2s ease;
        }
        
        .input-container:focus-within { 
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        input { 
            flex-grow: 1; 
            border: none;
            background: transparent;
            color: white;
            font-size: 15px; 
            outline: none; 
            padding: 10px 0;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        
        button { 
            background: transparent; 
            color: #8ab4f8; 
            border: none; 
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%; 
            cursor: pointer; 
            transition: all 0.2s ease; 
        }
        
        button:hover:not(:disabled) { 
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        button:disabled { 
            color: rgba(255, 255, 255, 0.15);
            cursor: not-allowed; 
        }

        /* SVG Icon for Send Action */
        button svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="gemini-header">
        <div class="header-title">Assistant Engine</div>
        <div id="status">⏳ Loading AI Model (WebGPU)...</div>
    </div>
    
    <div id="output"></div>
    
    <div class="input-wrapper">
        <div class="input-container">
            <input type="text" id="query" placeholder="Ask about materials, links, pricing..." disabled onkeydown="if(event.key === 'Enter') askAssistant()">
            <button id="send-btn" onclick="askAssistant()" disabled title="Send message">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { pipeline, cosineSimilarity } from 'https://jsdelivr.net';

    let extractor;
    let faqDatabase = [];
    const statusDiv = document.getElementById('status');

    async function init() {
        try {
            const response = await fetch('https://github.io');
            faqDatabase = await response.json();

            statusDiv.innerText = "⚡ Initializing WebGPU...";
            
            extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                device: 'webgpu' 
            });

            statusDiv.innerText = "🧠 Processing Context...";
            for (let item of faqDatabase) {
                const output = await extractor(item.text, { pooling: 'mean', normalize: true });
                item.embedding = output.data;
            }

            statusDiv.innerText = "🟢 Ready (WebGPU)";
            document.getElementById('query').disabled = false;
            document.getElementById('send-btn').disabled = false;
        } catch (err) {
            console.log("WebGPU fallback triggered:", err);
            try {
                statusDiv.innerText = "🔄 Initializing CPU Fallback...";
                extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                statusDiv.innerText = "🟢 Ready (CPU)";
                document.getElementById('query').disabled = false;
                document.getElementById('send-btn').disabled = false;
            } catch (fallbackErr) {
                statusDiv.innerText = "❌ Error loading engine.";
            }
        }
    }

    window.askAssistant = async function() {
        const queryInput = document.getElementById('query');
        const queryText = queryInput.value.trim();
        if (!queryText) return;

        const outputDiv = document.getElementById('output');
        
        // Render User Message Row
        outputDiv.innerHTML += `
            <div class="message-row user-row">
                <div class="bubble user-bubble">${queryText}</div>
            </div>
        `;
        queryInput.value = '';
        outputDiv.scrollTop = outputDiv.scrollHeight;
        
        const queryEmbeddingOutput = await extractor(queryText, { pooling: 'mean', normalize: true });
        const queryEmbedding = queryEmbeddingOutput.data;

        let bestMatch = null;
        let highestScore = -1;

        for (let item of faqDatabase) {
            const score = cosineSimilarity(queryEmbedding, item.embedding);
            if (score > highestScore) {
                highestScore = score;
                bestMatch = item;
            }
        }

        // Render AI Response Row
        if (highestScore > 0.45) {
            outputDiv.innerHTML += `
                <div class="message-row ai-row">
                    <div class="bubble ai-bubble">
                        ${bestMatch.text}
                        <div class="source-container">
